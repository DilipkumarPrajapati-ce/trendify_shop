<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trendify | Premium Clothing Hub</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <nav class="navbar">
        <div class="logo">TRENDIFY 3D</div>
        <divclass="nav-links">
            <a href="{% url 'home' %}">Home</a>
            <a href="{% url 'men' %}">Men</a>
            <a href="{% url 'women' %}">Women</a>
            <a href="{% url 'kids' %}">Kids</a>
            {% if user.is_authenticated %}
                <a href="{% url 'logout' %}" class="auth-btn">Logout ({{ user.username }})</a>
            {% else %}
                <a href="{% url 'login' %}" class="auth-btn">Login</a>
            {% endif %}
        </div>
    </nav>

    <main class="container">
        {% block content %}
        {% endblock %}
    </main>

    <script src="{% static 'js/main.js' %}"></script>
</body>
</html>
